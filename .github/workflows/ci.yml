name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync dependencies (app + dev tooling)
        run: uv sync

      - name: Ruff (lint)
        run: uv run ruff check src tests

      - name: Mypy (type check)
        run: uv run mypy

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync dependencies (app + dev tooling)
        run: uv sync --python ${{ matrix.python-version }}

      - name: Run the offline test suite with coverage
        # pyproject's pytest addopts enforce --cov-fail-under=80.
        run: uv run pytest -q
